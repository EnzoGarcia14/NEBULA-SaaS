<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEBULA SaaS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family:Inter,sans-serif;
    background:linear-gradient(120deg,#0b0f1a,#1a1440,#0b0f1a);
    background-size:300% 300%;
    animation:bg 10s ease infinite;
    color:white;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.glass{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(16px);
}

.section-title{
    color:#c084fc;
    font-size:1.1rem;
    font-weight:600;
    margin-top:1.5rem;
    margin-bottom:0.75rem;
    border-left:4px solid #a855f7;
    padding-left:0.75rem;
}

.result-card{
    background:rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.08);
}

input{
    outline:none;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="fixed top-0 w-full bg-black/40 backdrop-blur z-50 p-4 flex justify-between items-center">

    <div class="font-bold text-3xl text-purple-400">
        NEBULA SaaS
    </div>

    <div class="flex gap-4">
        <button onclick="scrollToTop()">Dashboard</button>
    </div>

</div>

<!-- PAGE -->
<section class="pt-24 max-w-6xl mx-auto p-4">

<div class="glass p-8 rounded-3xl">

<h1 class="text-3xl font-bold text-center mb-8">
    Recherche Avancée OSINT
</h1>

<form id="searchForm" class="space-y-8">

<!-- IDENTITE -->
<div>

<h2 class="section-title">
    Identité
</h2>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<input id="nom"
type="text"
placeholder="Nom"
class="p-3 bg-black/40 rounded-xl">

<input id="prenom"
type="text"
placeholder="Prénom"
class="p-3 bg-black/40 rounded-xl">

<input id="nom_naissance"
type="text"
placeholder="Nom de naissance"
class="p-3 bg-black/40 rounded-xl">

<input id="nom_affiche"
type="text"
placeholder="Nom affiché"
class="p-3 bg-black/40 rounded-xl">

</div>

</div>

<!-- CONTACT -->
<div>

<h2 class="section-title">
    Contact
</h2>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<input id="email"
type="email"
placeholder="Email"
class="p-3 bg-black/40 rounded-xl">

<input id="telephone"
type="text"
placeholder="Téléphone"
class="p-3 bg-black/40 rounded-xl">

<input id="pseudo"
type="text"
placeholder="Pseudo"
class="p-3 bg-black/40 rounded-xl">

<input id="adresse_ip"
type="text"
placeholder="Adresse IP"
class="p-3 bg-black/40 rounded-xl">

</div>

</div>

<!-- LOCALISATION -->
<div>

<h2 class="section-title">
    Localisation
</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

<input id="adresse"
type="text"
placeholder="Adresse"
class="p-3 bg-black/40 rounded-xl">

<input id="code_postal"
type="text"
placeholder="Code postal"
class="p-3 bg-black/40 rounded-xl">

<input id="ville"
type="text"
placeholder="Ville"
class="p-3 bg-black/40 rounded-xl">

</div>

</div>

<!-- FIVEM -->
<div>

<h2 class="section-title">
    FiveM / GTA RP
</h2>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<input id="steam_id"
type="text"
placeholder="Steam ID"
class="p-3 bg-black/40 rounded-xl">

<input id="fivem_license"
type="text"
placeholder="FiveM License"
class="p-3 bg-black/40 rounded-xl">

<input id="discord"
type="text"
placeholder="Discord"
class="p-3 bg-black/40 rounded-xl">

<input id="xbl"
type="text"
placeholder="Xbox Live"
class="p-3 bg-black/40 rounded-xl">

</div>

</div>

<!-- AVANCE -->
<div>

<h2 class="section-title">
    Champs avancés
</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

<input id="nir"
type="text"
placeholder="NIR"
class="p-3 bg-black/40 rounded-xl">

<input id="iban"
type="text"
placeholder="IBAN"
class="p-3 bg-black/40 rounded-xl">

<input id="bic"
type="text"
placeholder="BIC"
class="p-3 bg-black/40 rounded-xl">

<input id="vin"
type="text"
placeholder="VIN / Plaque"
class="p-3 bg-black/40 rounded-xl md:col-span-3">

</div>

</div>

</form>

<!-- BUTTON -->
<button
onclick="searchOSINT()"
class="mt-10 w-full py-4 bg-gradient-to-r from-purple-600 to-violet-600 rounded-2xl text-lg font-semibold hover:opacity-90 transition"
>
    Lancer l'Analyse
</button>

<!-- RESULTS -->
<div id="results"
class="hidden mt-10 space-y-6">

<h2 class="text-2xl font-bold text-green-400">
    Résultats
</h2>

<div id="results-content"
class="grid grid-cols-1 md:grid-cols-2 gap-4">
</div>

</div>

</div>

</section>

<script>

function scrollToTop(){

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}

async function searchOSINT(){

    const email =
        document.getElementById("email").value.trim();

    const pseudo =
        document.getElementById("pseudo").value.trim();

    const telephone =
        document.getElementById("telephone").value.trim();

    const nom =
        document.getElementById("nom").value.trim();

    const prenom =
        document.getElementById("prenom").value.trim();

    let html = "";

    html += `
        <div class="result-card p-5 rounded-2xl">

        <h3 class="text-purple-400 text-xl mb-4">
            Recherches OSINT
        </h3>
    `;

    // EMAIL
    if(email){

        html += `

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://haveibeenpwned.com/account/${encodeURIComponent(email)}">
                HaveIBeenPwned
            </a>

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://epieos.com/?q=${encodeURIComponent(email)}">
                EPIEOS
            </a>

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://intelx.io/?s=${encodeURIComponent(email)}">
                IntelX
            </a>

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://www.dehashed.com/search?query=${encodeURIComponent(email)}">
                DeHashed
            </a>

        `;
    }

    // PSEUDO
    if(pseudo){

        html += `

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://whatsmyname.app/?q=${encodeURIComponent(pseudo)}">
                WhatsMyName
            </a>

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://namechk.com/${encodeURIComponent(pseudo)}">
                Namechk
            </a>

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://www.social-searcher.com/search-users/?q=${encodeURIComponent(pseudo)}">
                Social Searcher
            </a>

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://github.com/sherlock-project/sherlock">
                Sherlock
            </a>

        `;
    }

    // TELEPHONE
    if(telephone){

        html += `

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://intelx.io/?s=${encodeURIComponent(telephone)}">
                IntelX Téléphone
            </a>

        `;
    }

    // NOM / PRENOM
    if(nom || prenom){

        const fullname = `${prenom} ${nom}`;

        html += `

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://thatsthem.com/name/${encodeURIComponent(fullname)}">
                That'sThem
            </a>

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://www.truepeoplesearch.com/results?name=${encodeURIComponent(fullname)}">
                TruePeopleSearch
            </a>

            <a target="_blank"
            class="block text-blue-400 hover:underline mb-2"
            href="https://www.spokeo.com/${encodeURIComponent(fullname)}">
                Spokeo
            </a>

        `;
    }

    // OUTILS
    html += `

        <a target="_blank"
        class="block text-blue-400 hover:underline mb-2"
        href="https://hunter.io">
            Hunter.io
        </a>

        <a target="_blank"
        class="block text-blue-400 hover:underline mb-2"
        href="https://www.maltego.com">
            Maltego
        </a>

    </div>
    `;

    document.getElementById("results-content")
        .innerHTML = html;

    document.getElementById("results")
        .classList
        .remove("hidden");
}

</script>

</body>
</html>
